<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bản Đồ Hệ Thống Thủy Lợi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #273549;
  --border: #334155; --accent: #38bdf8; --accent2: #0ea5e9;
  --text: #f1f5f9; --text2: #94a3b8; --green: #4ade80;
  --sidebar-w: 300px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { height: 100%; width: 100%; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

#app { display: flex; height: 100vh; width: 100vw; }
#map { flex: 1; height: 100%; z-index: 1; }

/* Sidebar */
#sidebar {
  width: var(--sidebar-w); height: 100%; background: var(--bg);
  border-right: 1px solid var(--border); display: flex;
  flex-direction: column; z-index: 1000; transition: transform 0.3s ease; flex-shrink: 0;
}

.sidebar-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); background: var(--surface); }
.sidebar-header h2 { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 2px; }
.sidebar-header p { font-size: 11px; color: var(--text2); }

/* Upload */
.upload-zone { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.nut-upload {
  display: block; width: 100%; padding: 8px 12px; text-align: center;
  background: var(--surface2); border: 1.5px dashed var(--accent2);
  border-radius: 7px; color: var(--accent); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.nut-upload:hover { background: var(--accent2); color: white; border-style: solid; }
.thong-bao { display: block; text-align: center; font-size: 11px; color: var(--green); margin-top: 5px; min-height: 16px; }

/* Nền bản đồ */
.layer-section { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.layer-section label { font-size: 10px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 5px; }
.layer-btns { display: flex; gap: 5px; }
.layer-btn {
  flex: 1; padding: 5px 4px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); border-radius: 5px; background: var(--surface2);
  color: var(--text2); cursor: pointer; transition: all .15s;
}
.layer-btn.active { background: var(--accent2); border-color: var(--accent); color: white; }

/* Vis controls */
.vis-controls { padding: 7px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
.vis-btn {
  flex: 1; padding: 5px 8px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); border-radius: 5px; background: var(--surface2);
  color: var(--text2); cursor: pointer; transition: all .15s;
}
.vis-btn:hover { background: var(--border); color: var(--text); }

/* Search */
.search-box { padding: 7px 12px; border-bottom: 1px solid var(--border); }
.search-box input {
  width: 100%; padding: 7px 10px; font-size: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text); outline: none;
}
.search-box input::placeholder { color: var(--text2); }
.search-box input:focus { border-color: var(--accent); }

/* Danh sách */
#danhSachKenh { flex: 1; overflow-y: auto; padding: 5px 8px; }
#danhSachKenh::-webkit-scrollbar { width: 4px; }
#danhSachKenh::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.nhom-header {
  padding: 8px 6px 3px; font-size: 10px; font-weight: 700;
  color: var(--text2); text-transform: uppercase; letter-spacing: .06em;
  border-top: 1px solid var(--border); margin-top: 4px;
}
.nhom-header:first-child { border-top: none; margin-top: 0; }

.kenh-item {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 8px; margin-bottom: 3px;
  border-radius: 6px; cursor: pointer;
  background: var(--surface); border: 1px solid transparent; transition: all .15s;
}
.kenh-item:hover { border-color: var(--border); background: var(--surface2); }
.kenh-item.hidden-layer { opacity: 0.4; }
.kenh-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.kenh-info { flex: 1; min-width: 0; }
.kenh-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kenh-meta { font-size: 10px; color: var(--text2); margin-top: 1px; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text2); padding: 2px 3px; flex-shrink: 0;
}
.icon-btn:hover { color: var(--accent); }

/* Stats */
#statsBar {
  padding: 6px 12px; border-top: 1px solid var(--border);
  display: flex; gap: 12px; font-size: 11px; color: var(--text2);
  background: var(--surface);
}
#statsBar b { color: var(--accent); }

/* Toggle sidebar (mobile) */
#btnToggle {
  position: absolute; top: 12px; left: 12px; z-index: 1100;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px; width: 34px; height: 34px;
  font-size: 15px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
}

/* GPS button */
#btnGPS {
  position: absolute; bottom: 22px; right: 12px; z-index: 900;
  background: var(--accent2); color: white; border: none;
  border-radius: 10px; padding: 10px 16px; cursor: pointer;
  font-weight: 700; font-size: 13px;
  box-shadow: 0 4px 14px rgba(14,165,233,.4);
  display: flex; align-items: center; gap: 6px;
}
#btnGPS:active { background: #0284c7; }

.gps-dot { background: #38bdf8; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 8px #38bdf8; }

/* Popup */
.my-popup { font-family: Arial, sans-serif; min-width: 200px; padding: 12px 14px; }
.my-popup .p-title { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
.my-popup .p-km { font-size: 16px; font-weight: 700; color: #0ea5e9; background: #e0f2fe; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 7px; }
.my-popup .p-row { font-size: 12px; color: #334155; margin-bottom: 3px; }
.my-popup .p-row b { color: #1e293b; }
.my-popup .p-desc { font-size: 11px; color: #64748b; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e2e8f0; white-space: pre-line; line-height: 1.5; }
.leaflet-popup-content-wrapper { border-radius: 10px !important; padding: 0 !important; overflow: hidden; }
.leaflet-popup-content { margin: 0 !important; }

@media (max-width: 640px) {
  :root { --sidebar-w: 280px; }
  #sidebar { position: absolute; left: 0; top: 0; box-shadow: 4px 0 20px rgba(0,0,0,.6); }
  #sidebar.hidden { transform: translateX(-100%); }
  #btnToggle { display: flex; }
  #btnToggle.open { left: calc(var(--sidebar-w) + 8px); }
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>🌊 Hệ Thống Thủy Lợi</h2>
      <p id="subTitle">Đang tải dữ liệu...</p>
    </div>

    <div class="upload-zone">
      <label for="fileInput" class="nut-upload">📂 Thêm file GeoJSON</label>
      <input type="file" id="fileInput" accept=".geojson,.json" multiple style="display:none">
      <span class="thong-bao" id="thongBao"></span>
    </div>

    <div class="layer-section">
      <label>Nền bản đồ</label>
      <div class="layer-btns">
        <button class="layer-btn active" id="btnOsm">🗺️ OSM</button>
        <button class="layer-btn" id="btnSat">🛰️ Vệ tinh</button>
        <button class="layer-btn" id="btnTopo">🏔️ Địa hình</button>
      </div>
    </div>

    <div class="vis-controls">
      <button class="vis-btn" id="btnHienTat">✅ Hiện tất cả</button>
      <button class="vis-btn" id="btnAnTat">🙈 Ẩn tất cả</button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Tìm tên cán bộ, tuyến kênh...">
    </div>

    <div id="danhSachKenh"></div>

    <div id="statsBar">
      <span>Hiện: <b id="sVis">0</b></span>
      <span>Ẩn: <b id="sHid">0</b></span>
      <span>Tổng: <b id="sTot">0</b></span>
    </div>
  </div>

  <div id="map"></div>
</div>

<button id="btnToggle">☰</button>
<button id="btnGPS">📍 GPS</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// =============================================
// KHỞI TẠO SAU KHI TRANG TẢI XONG
// =============================================
window.addEventListener('load', function() {

  // --- Bản đồ ---
  var map = L.map('map', { zoomControl: false }).setView([20.93, 105.83], 13);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  var tiles = {
    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
    sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
    topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 })
  };
  tiles.osm.addTo(map);

  document.getElementById('btnOsm').addEventListener('click', function() { setTile('osm', this); });
  document.getElementById('btnSat').addEventListener('click', function() { setTile('sat', this); });
  document.getElementById('btnTopo').addEventListener('click', function() { setTile('topo', this); });

  function setTile(key, btn) {
    Object.values(tiles).forEach(function(t) { if (map.hasLayer(t)) map.removeLayer(t); });
    tiles[key].addTo(map);
    document.querySelectorAll('.layer-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }

  // --- State ---
  var kenhLayers = {};

  // --- Màu ---
  var COLORS = ['#38bdf8','#f87171','#4ade80','#facc15','#c084fc','#fb923c','#2dd4bf','#f472b6','#a3e635','#60a5fa'];
  function mauKenh(name) {
    var h = 0;
    for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return COLORS[Math.abs(h) % COLORS.length];
  }

  // --- Tính khoảng cách dọc theo tuyến ---
  function tinhMet(clickLL, coords) {
    var minI = 0, minD = Infinity;
    for (var i = 0; i < coords.length - 1; i++) {
      var d = L.LineUtil.pointToSegmentDistance(
        map.latLngToLayerPoint(clickLL),
        map.latLngToLayerPoint(coords[i]),
        map.latLngToLayerPoint(coords[i+1])
      );
      if (d < minD) { minD = d; minI = i; }
    }
    var total = 0;
    for (var j = 0; j < minI; j++) total += coords[j].distanceTo(coords[j+1]);
    total += coords[minI].distanceTo(clickLL);
    return total;
  }

  function tongDai(coords) {
    var t = 0;
    for (var i = 0; i < coords.length - 1; i++) t += coords[i].distanceTo(coords[i+1]);
    return t;
  }

  function toKM(m) {
    return 'K' + Math.floor(m/1000) + '+' + String(Math.round(m%1000)).padStart(3,'0');
  }

  // --- Popup ---
  function moPopup(feature, layer, latlng) {
    var coords = layer.getLatLngs();
    var met = tinhMet(latlng, coords);
    var tong = tongDai(coords);
    var desc = feature.properties.description || '';
    if (typeof desc === 'object' && desc && desc.value) desc = desc.value.replace(/<[^>]+>/g,'').trim();
    if (typeof desc !== 'string') desc = '';

    var html = '<div class="my-popup">'
      + '<div class="p-title">📋 ' + feature.properties.name + '</div>'
      + '<div class="p-km">' + toKM(met) + '</div>'
      + '<div class="p-row">📍 Cách đầu tuyến: <b>' + met.toFixed(0) + ' m</b></div>'
      + '<div class="p-row">📏 Tổng chiều dài: <b>' + tong.toFixed(0) + ' m (' + (tong/1000).toFixed(2) + ' km)</b></div>'
      + '<div class="p-row">🌐 Tọa độ: <b>' + latlng.lat.toFixed(6) + ', ' + latlng.lng.toFixed(6) + '</b></div>'
      + (desc ? '<div class="p-desc">' + desc.substring(0,300) + '</div>' : '')
      + '</div>';

    L.popup({ maxWidth: 280 }).setLatLng(latlng).setContent(html).openOn(map);
  }

  // --- Cập nhật stats ---
  function updateStats() {
    var keys = Object.keys(kenhLayers);
    var vis = keys.filter(function(k) { return kenhLayers[k].visible; }).length;
    document.getElementById('sVis').textContent = vis;
    document.getElementById('sHid').textContent = keys.length - vis;
    document.getElementById('sTot').textContent = keys.length;
    document.getElementById('subTitle').textContent = keys.length + ' tuyến kênh';
  }

  // --- Ẩn/hiện ---
  function setVisible(name, show) {
    var k = kenhLayers[name];
    if (!k) return;
    k.visible = show;
    if (show) { if (!map.hasLayer(k.layer)) k.layer.addTo(map); }
    else { if (map.hasLayer(k.layer)) map.removeLayer(k.layer); }
    if (k.item) {
      k.item.classList.toggle('hidden-layer', !show);
      k.item.querySelector('.eye-btn').textContent = show ? '👁️' : '🙈';
    }
    updateStats();
  }

  document.getElementById('btnHienTat').addEventListener('click', function() {
    Object.keys(kenhLayers).forEach(function(n) { setVisible(n, true); });
  });
  document.getElementById('btnAnTat').addEventListener('click', function() {
    Object.keys(kenhLayers).forEach(function(n) { setVisible(n, false); });
  });

  // --- Tìm kiếm ---
  document.getElementById('searchInput').addEventListener('input', function() {
    var q = this.value.toLowerCase();
    document.querySelectorAll('.kenh-item').forEach(function(el) {
      el.style.display = el.dataset.search.includes(q) ? '' : 'none';
    });
  });

  // --- Sidebar toggle (mobile) ---
  var sidebarOpen = true;
  document.getElementById('btnToggle').addEventListener('click', function() {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('hidden', !sidebarOpen);
    this.classList.toggle('open', sidebarOpen);
    this.textContent = sidebarOpen ? '✕' : '☰';
  });

  // --- GPS ---
  var gpsMarker = null, gpsCircle = null;
  document.getElementById('btnGPS').addEventListener('click', function() {
    if (!navigator.geolocation) return alert('Thiết bị không hỗ trợ GPS!');
    map.locate({ setView: true, maxZoom: 17, enableHighAccuracy: true });
  });
  map.on('locationfound', function(e) {
    if (gpsMarker) { map.removeLayer(gpsMarker); map.removeLayer(gpsCircle); }
    gpsMarker = L.marker(e.latlng, {
      icon: L.divIcon({ className: 'gps-dot', iconSize: [14,14], iconAnchor: [7,7] })
    }).addTo(map).bindPopup(
      '<div style="padding:8px 10px;font-size:12px;"><b>📍 Vị trí của bạn</b><br>'
      + e.latlng.lat.toFixed(6) + ', ' + e.latlng.lng.toFixed(6)
      + '<br><small>±' + e.accuracy.toFixed(0) + ' m</small></div>'
    ).openPopup();
    gpsCircle = L.circle(e.latlng, { radius: e.accuracy, color: '#38bdf8', fillColor: '#38bdf8', fillOpacity: 0.08, weight: 1 }).addTo(map);
  });
  map.on('locationerror', function() { alert('Không lấy được vị trí GPS.'); });

  // =============================================
  // HÀM LOAD GEOJSON (dùng cho cả data gốc lẫn file upload)
  // =============================================
  function loadGeoJSON(data, tenNhom) {
    if (!data || !Array.isArray(data.features)) return;

    var listEl = document.getElementById('danhSachKenh');

    // Header nhóm
    if (tenNhom) {
      var hdr = document.createElement('div');
      hdr.className = 'nhom-header';
      hdr.textContent = '📁 ' + tenNhom;
      listEl.appendChild(hdr);
    }

    // Points
    data.features.forEach(function(f) {
      if (!f.geometry || f.geometry.type !== 'Point') return;
      var desc = f.properties.description || '';
      if (typeof desc === 'object' && desc && desc.value) desc = desc.value.replace(/<[^>]+>/g,'').trim();
      if (typeof desc !== 'string') desc = '';
      L.circleMarker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {
        radius: 6, fillColor: '#facc15', color: '#1e293b', weight: 1.5, fillOpacity: 0.95
      }).bindPopup(
        '<div style="padding:10px 12px;font-size:12px;"><b>' + (f.properties.name||'') + '</b>'
        + (desc ? '<br><span style="color:#555;font-size:11px;">' + desc.substring(0,200) + '</span>' : '')
        + '</div>'
      ).addTo(map);
    });

    // LineStrings
    var lines = data.features.filter(function(f) { return f.geometry && f.geometry.type === 'LineString'; });
    lines.sort(function(a,b) { return (a.properties.name||'').localeCompare(b.properties.name||'','vi'); });

    lines.forEach(function(f) {
      var name = f.properties.name || ('Kênh ' + (Object.keys(kenhLayers).length + 1));
      var color = mauKenh(name);
      var desc = f.properties.description || '';
      if (typeof desc === 'object' && desc && desc.value) desc = desc.value.replace(/<[^>]+>/g,'').trim();
      if (typeof desc !== 'string') desc = '';

      // Tránh trùng tên
      var key = name, n = 2;
      while (kenhLayers[key]) key = name + ' (' + (n++) + ')';

      var gl = L.geoJSON(f, { style: { color: color, weight: 4, opacity: 0.9, lineJoin: 'round', lineCap: 'round' } });
      gl.on('click', function(e) { moPopup(f, gl.getLayers()[0], e.latlng); });
      gl.on('mouseover', function() { gl.setStyle({ weight: 7 }); });
      gl.on('mouseout',  function() { gl.setStyle({ weight: 4 }); });
      gl.addTo(map);

      kenhLayers[key] = { layer: gl, visible: true };

      // List item
      var item = document.createElement('div');
      item.className = 'kenh-item';
      item.dataset.search = (key + ' ' + desc).toLowerCase();

      var safe = key.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      item.innerHTML =
        '<span class="kenh-color" style="background:' + color + '"></span>'
        + '<div class="kenh-info">'
        +   '<div class="kenh-name">' + key + '</div>'
        +   '<div class="kenh-meta">' + (desc.substring(0,60) || '—') + '</div>'
        + '</div>'
        + '<button class="icon-btn" title="Zoom" data-n="' + safe + '">🔍</button>'
        + '<button class="icon-btn eye-btn" title="Ẩn/Hiện" data-n="' + safe + '">👁️</button>';

      item.querySelector('[title="Zoom"]').addEventListener('click', function(e) {
        e.stopPropagation(); zoomToi(this.dataset.n);
      });
      item.querySelector('.eye-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        var nm = this.dataset.n;
        setVisible(nm, !kenhLayers[nm].visible);
      });
      item.addEventListener('click', function() {
        zoomToi(key);
        var lyr = kenhLayers[key].layer.getLayers()[0];
        var coords = lyr.getLatLngs();
        moPopup(f, lyr, coords[Math.floor(coords.length/2)]);
      });

      listEl.appendChild(item);
      kenhLayers[key].item = item;
    });

    // Fit bounds
    var allLayers = Object.values(kenhLayers);
    if (allLayers.length) {
      try {
        var bounds = allLayers[0].layer.getBounds();
        for (var i = 1; i < allLayers.length; i++) bounds.extend(allLayers[i].layer.getBounds());
        map.fitBounds(bounds, { padding: [20,20] });
      } catch(e) {}
    }
    updateStats();
  }

  function zoomToi(name) {
    var k = kenhLayers[name];
    if (!k) return;
    if (!k.visible) setVisible(name, true);
    map.fitBounds(k.layer.getBounds(), { maxZoom: 16, padding: [30,30] });
  }

  // =============================================
  // UPLOAD FILE GEOJSON MỚI
  // =============================================
  document.getElementById('fileInput').addEventListener('change', function(e) {
    var files = Array.from(e.target.files);
    if (!files.length) return;
    var count = 0;
    files.forEach(function(file) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          var ten = file.name.replace(/\.geojson$/i,'').replace(/\.json$/i,'');
          loadGeoJSON(data, ten);
          count++;
          if (count === files.length) {
            var tb = document.getElementById('thongBao');
            tb.textContent = '\u2705 Đã tải ' + count + ' file';
            setTimeout(function() { tb.textContent = ''; }, 3000);
          }
        } catch(err) {
          alert('File "' + file.name + '" lỗi: ' + err.message);
        }
      };
      reader.readAsText(file, 'UTF-8');
    });
    e.target.value = '';
  });

  // =============================================
  // LOAD DỮ LIỆU GỐC
  // =============================================
  loadGeoJSON(DATA_GOC, null);

}); // end window.load
</script>
</body>
</html>
